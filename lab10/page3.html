<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница 3 - Таблицы</title>
    <style>
        body {font-family:Arial,sans-serif;margin:0;padding:0;line-height:1.6;color:#333;background:#f4f4f4;}
        .container {max-width:1200px;margin:0 auto;padding:20px;}
        header {background:#2c3e50;color:white;padding:1em 0;}
        .top-menu {background:#34495e;padding:10px 0;}
        .top-menu ul {list-style:none;margin:0;padding:0;display:flex;justify-content:center;}
        .top-menu li {position:relative;margin:0 10px;}
        .top-menu li a {color:white;text-decoration:none;padding:10px 20px;display:block;transition:all 0.3s;font-weight:bold;}
        .top-menu li:hover {transform:scale(1.1);z-index:10;}
        .top-menu li:hover a {background:#e74c3c;color:white;border-radius:5px;}
        
        .ad-block {position:fixed;top:10px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#ff6b6b,#feca57);color:white;padding:15px 30px;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:1000;text-align:center;font-weight:bold;max-width:80%;border:3px solid #fff;}
        .fixed-example {position:fixed;bottom:30px;right:30px;background:#27ae60;color:white;padding:15px 25px;border-radius:50px;box-shadow:0 5px 20px rgba(0,0,0,0.3);font-weight:bold;z-index:999;}
        .table-container {position:relative;margin:30px 0;padding:20px;background:#ecf0f1;border-radius:10px;}
        .highlight {position:absolute;top:20px;right:30px;background:#f39c12;color:white;padding:8px 16px;border-radius:5px;}
        footer {background:#2c3e50;color:white;text-align:center;padding:20px;margin-top:80px;}
    </style>
</head>
<body>
    <div class="ad-block">💡 Fixed реклама всегда на виду!</div>
    <header><div class="container"><h1 style="text-align:center;margin:0;">Страница 3: Таблицы</h1></div></header>
    
    <nav class="top-menu">
        <div class="container">
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="page2.html">Страница 2</a></li>
                <li><a href="page3.html">Страница 3</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="table-container">
            <div class="highlight">Relative</div>
            <h2>Таблицы в веб-дизайне</h2>
            <!-- Таблица из лабораторной + свои данные -->
            <table>
                <tr><th>Свойство</th><th>Описание</th></tr>
                <tr><td>table-layout</td><td>fixed / auto</td></tr>
            </table>
        </div>
        <div class="fixed-example">Fixed блок внизу</div>
    </main>
    <footer><p>© Лабораторная работа</p></footer>
</body>
</html>
